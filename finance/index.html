<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>财务小管家 · 刘毅</title>
<meta name="description" content="个人记账本 - 收支记录、分类统计、月度趋势图表，数据本地存储安全可靠。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0C0C18; --bg2:#141426; --card:rgba(255,255,255,0.03);
  --card-border:rgba(255,255,255,0.06); --card-hover:rgba(255,255,255,0.07);
  --text:#F1F1F6; --text2:#8888AA; --text3:#555578;
  --primary:#7C5CFC; --primary-light:#B4A5FF; --primary-glow:rgba(124,92,252,0.25);
  --income:#00D68F; --income-bg:rgba(0,214,143,0.12); --expense:#FF6B6B; --expense-bg:rgba(255,107,107,0.12);
  --radius:16px; --radius-lg:24px;
  --shadow:0 8px 32px rgba(0,0,0,0.4); --shadow-lg:0 20px 60px rgba(0,0,0,0.5);
  --nav:72px; --font:'Inter','Noto Sans SC',system-ui,-apple-system,sans-serif;
  --transition:0.4s cubic-bezier(0.22,1,0.36,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 80% 0%,rgba(124,92,252,0.06) 0%,transparent 50%),radial-gradient(ellipse at 20% 100%,rgba(0,214,143,0.04) 0%,transparent 50%)}

nav{position:fixed;top:0;left:0;right:0;height:var(--nav);z-index:100;background:rgba(12,12,24,0.8);backdrop-filter:blur(24px) saturate(1.8);-webkit-backdrop-filter:blur(24px) saturate(1.8);border-bottom:1px solid var(--card-border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 28px;height:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;color:var(--text);text-decoration:none}
.nav-logo i{font-size:1.3rem;background:linear-gradient(135deg,var(--primary),var(--income));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-actions{display:flex;gap:8px}
.btn-icon{width:38px;height:38px;border-radius:12px;border:1px solid var(--card-border);background:var(--card);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);font-size:.95rem;text-decoration:none}
.btn-icon:hover{background:var(--card-hover);color:var(--text);border-color:var(--primary)}

.app{padding-top:calc(var(--nav) + 24px);max-width:1200px;margin:0 auto;padding-left:24px;padding-right:24px;padding-bottom:60px}

.hero{text-align:center;padding:36px 0 40px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;background:var(--primary-glow);border:1px solid rgba(124,92,252,0.2);font-size:.78rem;color:var(--primary-light);margin-bottom:14px;font-weight:500}
.hero h1{font-size:2.4rem;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--primary-light) 50%,var(--income) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text2);font-size:.95rem}

/* Summary Cards */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.summary-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px 24px;transition:all var(--transition);position:relative;overflow:hidden}
.summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.summary-card.income::before{background:linear-gradient(90deg,var(--income),transparent)}
.summary-card.expense::before{background:linear-gradient(90deg,var(--expense),transparent)}
.summary-card.total::before{background:linear-gradient(90deg,var(--primary),transparent)}
.summary-card:hover{background:var(--card-hover);transform:translateY(-2px)}
.summary-card .s-label{font-size:.78rem;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.summary-card .s-value{font-size:1.5rem;font-weight:700}
.summary-card .s-value.income{color:var(--income)}
.summary-card .s-value.expense{color:var(--expense)}
.summary-card .s-value.total{color:var(--primary-light)}
.summary-card .s-sub{font-size:.75rem;color:var(--text3);margin-top:2px}

/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:24px}
.chart-card.full{grid-column:1/-1}
.chart-card h3{font-size:.9rem;font-weight:600;margin-bottom:16px;color:var(--text2);display:flex;align-items:center;gap:8px}
.chart-card h3 i{color:var(--primary)}
.chart-box{width:100%;height:240px;position:relative}
.chart-box.tall{height:180px}

/* Records */
.records-section{margin-top:8px}
.records-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.records-header h2{font-size:1.15rem;font-weight:700;display:flex;align-items:center;gap:8px}
.records-header h2 i{color:var(--primary)}
.records-header .add-btn{padding:10px 24px;border-radius:12px;background:linear-gradient(135deg,var(--primary),#9B85FF);color:#fff;border:none;font-weight:600;font-size:.85rem;cursor:pointer;transition:all var(--transition);font-family:var(--font)}
.records-header .add-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--primary-glow)}

.records-list{display:flex;flex-direction:column;gap:6px}
.record-item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);transition:all var(--transition)}
.record-item:hover{background:var(--card-hover);border-color:var(--card-border)}
.record-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.record-icon.income{background:var(--income-bg);color:var(--income)}
.record-icon.expense{background:var(--expense-bg);color:var(--expense)}
.record-info{flex:1}
.record-info .r-title{font-size:.92rem;font-weight:600;margin-bottom:2px}
.record-info .r-meta{font-size:.78rem;color:var(--text3)}
.record-amount{font-weight:700;font-size:.95rem}
.record-amount.income{color:var(--income)}
.record-amount.expense{color:var(--expense)}
.record-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;border-radius:8px;transition:all var(--transition);font-size:.85rem;opacity:0}
.record-item:hover .record-del{opacity:1}
.record-del:hover{color:var(--expense);background:var(--expense-bg)}

.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state i{font-size:3rem;margin-bottom:12px;opacity:.3}
.empty-state p{font-size:.9rem}

footer{text-align:center;padding:32px 24px;color:var(--text3);font-size:.82rem;border-top:1px solid var(--card-border);margin-top:48px}
footer a{color:var(--primary-light);text-decoration:none}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s ease;backdrop-filter:blur(8px)}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-content{background:var(--bg2);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:32px;max-width:440px;width:100%;transform:scale(.95);transition:transform .3s ease}
.modal-overlay.show .modal-content{transform:scale(1)}
.modal-content h3{font-size:1.2rem;font-weight:700;margin-bottom:20px}
.modal-content label{display:block;font-size:.82rem;color:var(--text2);margin-bottom:6px}
.modal-content input,.modal-content select{padding:12px 14px;border-radius:10px;border:1px solid var(--card-border);background:var(--card);color:var(--text);font-size:.9rem;width:100%;outline:none;transition:border-color var(--transition);font-family:var(--font);margin-bottom:14px}
.modal-content input:focus,.modal-content select:focus{border-color:var(--primary)}
.modal-content .modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-content .modal-actions button{flex:1;padding:12px;border-radius:10px;font-weight:600;font-size:.85rem;cursor:pointer;transition:all var(--transition);font-family:var(--font);border:none}
.modal-content .modal-actions .m-confirm{background:linear-gradient(135deg,var(--primary),#9B85FF);color:#fff}
.modal-content .modal-actions .m-confirm:hover{box-shadow:0 8px 30px var(--primary-glow)}
.modal-content .modal-actions .m-cancel{background:var(--card);color:var(--text2);border:1px solid var(--card-border)}
.modal-content .modal-actions .m-cancel:hover{background:var(--card-hover);color:var(--text)}

@media(max-width:900px){.summary-grid{grid-template-columns:repeat(2,1fr)}.charts-grid{grid-template-columns:1fr}}
@media(max-width:520px){.summary-grid{grid-template-columns:1fr}.hero h1{font-size:1.7rem}.modal-content{padding:24px}}
</style>
</head>
<body>
<nav><div class="nav-inner">
<a href="../" class="nav-logo"><i class="fas fa-wallet"></i> 财务小管家</a>
<div class="nav-actions">
<a href="../" class="btn-icon" title="返回"><i class="fas fa-home"></i></a>
</div></div></nav>

<div class="app">
  <div class="hero">
    <div class="hero-badge"><i class="fas fa-shield-alt"></i> 数据本地保存 · 安全无忧</div>
    <h1>财务小管家</h1>
    <p>记录每一笔收支，掌握自己的财务状况</p>
  </div>

  <div class="summary-grid" id="summaryGrid">
    <div class="summary-card total"><div class="s-label">总资产</div><div class="s-value total" id="totalBalance">¥0</div><div class="s-sub">当前余额</div></div>
    <div class="summary-card income"><div class="s-label">本月收入</div><div class="s-value income" id="monthIncome">¥0</div><div class="s-sub" id="incomeCount">0 笔</div></div>
    <div class="summary-card expense"><div class="s-label">本月支出</div><div class="s-value expense" id="monthExpense">¥0</div><div class="s-sub" id="expenseCount">0 笔</div></div>
    <div class="summary-card total"><div class="s-label">结余</div><div class="s-value total" id="monthBalance">¥0</div><div class="s-sub">本月</div></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card"><h3><i class="fas fa-chart-pie"></i> 支出分类</h3><div class="chart-box" id="pieChart"><div class="empty-state" style="padding:60px 0"><i class="fas fa-chart-pie"></i><p>暂无数据</p></div></div></div>
    <div class="chart-card"><h3><i class="fas fa-chart-line"></i> 月度趋势</h3><div class="chart-box" id="lineChart"><div class="empty-state" style="padding:60px 0"><i class="fas fa-chart-line"></i><p>暂无数据</p></div></div></div>
    <div class="chart-card full"><h3><i class="fas fa-chart-bar"></i> 每日支出分布</h3><div class="chart-box tall" id="barChart"><div class="empty-state" style="padding:40px 0"><i class="fas fa-chart-bar"></i><p>暂无数据</p></div></div></div>
  </div>

  <div class="records-section">
    <div class="records-header">
      <h2><i class="fas fa-list"></i> 最近记录</h2>
      <button class="add-btn" onclick="openModal()"><i class="fas fa-plus"></i> 记一笔</button>
    </div>
    <div class="records-list" id="recordsList"><div class="empty-state"><i class="fas fa-receipt"></i><p>还没有记账记录，点击右上角记一笔</p></div></div>
  </div>
</div>

<footer><p>&copy; 2026 刘毅 · 财务小管家 · 数据仅保存在本地 · <a href="../">返回作品集</a></p></footer>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <h3><i class="fas fa-pen"></i> 记一笔</h3>
    <label>类型</label>
    <select id="recordType"><option value="expense">支出</option><option value="income">收入</option></select>
    <label>金额 (¥)</label>
    <input type="number" id="recordAmount" placeholder="0.00" min="0" step="0.01">
    <label>分类</label>
    <select id="recordCategory"></select>
    <label>备注</label>
    <input type="text" id="recordNote" placeholder="买了什么？">
    <div class="modal-actions">
      <button class="m-cancel" onclick="closeModal()">取消</button>
      <button class="m-confirm" onclick="saveRecord()">保存</button>
    </div>
  </div>
</div>

<script>
(function(){
  var CATEGORIES={income:['工资','兼职','投资','红包','其他'],expense:['餐饮','交通','购物','娱乐','住房','通讯','医疗','教育','其他']};
  var curMonth=new Date().getMonth(),curYear=new Date().getFullYear();
  var records=JSON.parse(localStorage.getItem('finance_records')||'[]');
  var catSelect=document.getElementById('recordCategory');

  function updateCategories(){
    var type=document.getElementById('recordType').value;
    catSelect.innerHTML=CATEGORIES[type].map(function(c){return '<option value="'+c+'">'+c+'</option>'}).join('');
  }
  document.getElementById('recordType').addEventListener('change',updateCategories);
  updateCategories();

  function saveRecords(){try{localStorage.setItem('finance_records',JSON.stringify(records))}catch(e){}}

  function formatMoney(n){return '¥'+Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}

  function render(){
    var thisMonth=records.filter(function(r){var d=new Date(r.date);return d.getMonth()===curMonth&&d.getFullYear()===curYear});
    var monthIncome=thisMonth.filter(function(r){return r.type==='income'}).reduce(function(s,r){return s+Number(r.amount)},0);
    var monthExpense=thisMonth.filter(function(r){return r.type==='expense'}).reduce(function(s,r){return s+Number(r.amount)},0);
    var totalIncome=records.filter(function(r){return r.type==='income'}).reduce(function(s,r){return s+Number(r.amount)},0);
    var totalExpense=records.filter(function(r){return r.type==='expense'}).reduce(function(s,r){return s+Number(r.amount)},0);

    document.getElementById('totalBalance').textContent=formatMoney(totalIncome-totalExpense);
    document.getElementById('monthIncome').textContent=formatMoney(monthIncome);
    document.getElementById('monthExpense').textContent=formatMoney(monthExpense);
    document.getElementById('monthBalance').textContent=formatMoney(monthIncome-monthExpense);
    document.getElementById('incomeCount').textContent=thisMonth.filter(function(r){return r.type==='income'}).length+' 笔';
    document.getElementById('expenseCount').textContent=thisMonth.filter(function(r){return r.type==='expense'}).length+' 笔';

    // Records list
    var list=document.getElementById('recordsList');
    var sorted=records.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date)}).slice(0,20);
    if(sorted.length===0){
      list.innerHTML='<div class="empty-state"><i class="fas fa-receipt"></i><p>还没有记账记录，点击右上角记一笔</p></div>';
    }else{
      list.innerHTML=sorted.map(function(r,i){
        var idx=records.indexOf(r);
        var d=new Date(r.date);
        var icon=r.type==='income'?'<i class="fas fa-arrow-down"></i>':'<i class="fas fa-arrow-up"></i>';
        return '<div class="record-item"><div class="record-icon '+r.type+'">'+icon+'</div>'+
          '<div class="record-info"><div class="r-title">'+escHtml(r.note||r.category)+'</div><div class="r-meta">'+r.category+' · '+(d.getMonth()+1)+'月'+d.getDate()+'日</div></div>'+
          '<div class="record-amount '+r.type+'">'+(r.type==='income'?'+':'-')+Number(r.amount).toLocaleString()+'</div>'+
          '<button class="record-del" onclick="window.deleteRecord('+idx+')"><i class="fas fa-times"></i></button></div>';
      }).join('');
    }

    // Charts - use CSS only since ECharts is not loaded
    drawPieChart(thisMonth);
    drawLineChart();
    drawBarChart(thisMonth);
  }

  function escHtml(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML;}

  window.deleteRecord=function(idx){
    if(idx<0||idx>=records.length)return;
    records.splice(idx,1);
    saveRecords();render();
  };

  // Simple CSS bar charts
  function drawPieChart(monthData){
    var container=document.getElementById('pieChart');
    var expenses=monthData.filter(function(r){return r.type==='expense'});
    if(expenses.length===0){return;}
    var grouped={};
    expenses.forEach(function(r){grouped[r.category]=(grouped[r.category]||0)+Number(r.amount)});
    var total=Object.values(grouped).reduce(function(a,b){return a+b},0);
    var colors=['#7C5CFC','#FF6B6B','#00D68F','#FFAA00','#36C5F0','#FF8ED4','#7B68EE','#20C997','#E85D4A'];
    var html='<div style="display:flex;flex-wrap:wrap;gap:12px">';
    var i=0;
    for(var cat in grouped){
      var pct=(grouped[cat]/total*100).toFixed(1);
      html+='<div style="display:flex;align-items:center;gap:8px;min-width:120px"><div style="width:12px;height:12px;border-radius:3px;background:'+colors[i%colors.length]+'"></div><span style="font-size:.82rem;color:var(--text2)">'+cat+'</span><span style="font-size:.82rem;font-weight:600">'+pct+'%</span></div>';
      i++;
    }
    // Visual bar
    html+='<div style="width:100%;height:12px;border-radius:6px;background:var(--card-border);display:flex;overflow:hidden;margin-top:4px">';
    var j=0;
    for(var cat in grouped){
      var pct=grouped[cat]/total*100;
      html+='<div style="height:100%;width:'+pct+'%;background:'+colors[j%colors.length]+'"></div>';
      j++;
    }
    html+='</div></div>';
    container.innerHTML=html;
  }

  function drawLineChart(){
    var container=document.getElementById('lineChart');
    var months=[];
    for(var m=0;m<6;m++){
      var d=new Date();d.setMonth(d.getMonth()-m);
      var key=d.getFullYear()+'-'+d.getMonth();
      var income=records.filter(function(r){var dd=new Date(r.date);return dd.getFullYear()===d.getFullYear()&&dd.getMonth()===d.getMonth()&&r.type==='income'}).reduce(function(s,r){return s+Number(r.amount)},0);
      var expense=records.filter(function(r){var dd=new Date(r.date);return dd.getFullYear()===d.getFullYear()&&dd.getMonth()===d.getMonth()&&r.type==='expense'}).reduce(function(s,r){return s+Number(r.amount)},0);
      months.unshift({label:(d.getMonth()+1)+'月',income:income,expense:expense});
    }
    var max=Math.max.apply(null,months.map(function(m){return Math.max(m.income,m.expense,1)}));
    var html='<div style="display:flex;align-items:flex-end;gap:12px;height:160px;padding:0 8px">';
    months.forEach(function(m){
      var ih=m.income/max*140,eh=m.expense/max*140;
      html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end">'+
        '<span style="font-size:.65rem;color:var(--text3);margin-bottom:2px">'+m.income.toFixed(0)+'</span>'+
        '<div style="width:24px;height:'+Math.max(ih,2)+'px;border-radius:4px 4px 0 0;background:var(--income);opacity:.85;transition:height .5s ease"></div>'+
        '<div style="width:24px;height:'+Math.max(eh,2)+'px;border-radius:4px 4px 0 0;background:var(--expense);opacity:.85;margin-top:3px;transition:height .5s ease"></div>'+
        '<span style="font-size:.68rem;color:var(--text2);margin-top:6px;font-weight:500">'+m.label+'</span></div>';
    });
    html+='</div><div style="display:flex;gap:20px;justify-content:center;margin-top:8px"><span style="font-size:.75rem;color:var(--text2)"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--income);margin-right:4px"></span>收入</span><span style="font-size:.75rem;color:var(--text2)"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--expense);margin-right:4px"></span>支出</span></div>';
    container.innerHTML=html;
  }

  function drawBarChart(monthData){
    var container=document.getElementById('barChart');
    var expenses=monthData.filter(function(r){return r.type==='expense'});
    if(expenses.length===0){return;}
    var daily={};
    expenses.forEach(function(r){var d=new Date(r.date).getDate();daily[d]=(daily[d]||0)+Number(r.amount)});
    var daysInMonth=new Date(curYear,curMonth+1,0).getDate();
    var max=Math.max.apply(null,Object.values(daily).concat([1]));
    var html='<div style="display:flex;align-items:flex-end;gap:3px;height:140px;padding:0 4px">';
    for(var d=1;d<=daysInMonth;d++){
      var val=daily[d]||0;
      var h=val/max*130;
      html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end" title="'+d+'日: ¥'+val.toFixed(0)+'">'+
        '<div style="width:100%;height:'+Math.max(h,val>0?2:0)+'px;border-radius:3px 3px 0 0;background:'+(val>0?'var(--expense)':'var(--card-border)')+';opacity:'+(val>0?'.85':'.3')+'"></div>'+
        (d%5===0?'<span style="font-size:.6rem;color:var(--text3);margin-top:4px">'+d+'</span>':'')+'</div>';
    }
    html+='</div>';
    container.innerHTML=html;
  }

  // Modal
  window.openModal=function(){
    document.getElementById('modal').classList.add('show');
    document.getElementById('recordAmount').value='';
    document.getElementById('recordNote').value='';
    updateCategories();
    setTimeout(function(){document.getElementById('recordAmount').focus()},300);
  };
  window.closeModal=function(){document.getElementById('modal').classList.remove('show');};

  window.saveRecord=function(){
    var type=document.getElementById('recordType').value;
    var amount=parseFloat(document.getElementById('recordAmount').value);
    var category=document.getElementById('recordCategory').value;
    var note=document.getElementById('recordNote').value.trim();
    if(!amount||amount<=0){alert('请输入有效金额');return;}
    records.push({type:type,amount:amount,category:category,note:note||category,date:new Date().toISOString()});
    saveRecords();
    closeModal();
    render();
  };

  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

  render();
})();
</script>
</body>
</html>
