<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>财务小管家 · 刘毅</title>
<meta name="description" content="个人记账本 - 收支记录、分类统计、月度趋势图表，数据本地存储">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0C0C18;--bg2:#141426;--card:rgba(255,255,255,0.03);--card-border:rgba(255,255,255,0.06);--card-hover:rgba(255,255,255,0.07);--text:#F1F1F6;--text2:#8888AA;--text3:#555578;--primary:#7C5CFC;--primary-light:#B4A5FF;--primary-glow:rgba(124,92,252,0.25);--income:#00D68F;--income-bg:rgba(0,214,143,0.12);--expense:#FF6B6B;--expense-bg:rgba(255,107,107,0.12);--radius:16px;--radius-lg:24px;--shadow:0 8px 32px rgba(0,0,0,0.4);--shadow-lg:0 20px 60px rgba(0,0,0,0.5);--nav:72px;--font:'Inter','Noto Sans SC',system-ui,-apple-system,sans-serif;--transition:0.4s cubic-bezier(0.22,1,0.36,1)}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 80% 0%,rgba(124,92,252,0.06) 0%,transparent 50%),radial-gradient(ellipse at 20% 100%,rgba(0,214,143,0.04) 0%,transparent 50%)}
nav{position:fixed;top:0;left:0;right:0;height:var(--nav);z-index:100;background:rgba(12,12,24,0.8);backdrop-filter:blur(24px) saturate(1.8);-webkit-backdrop-filter:blur(24px) saturate(1.8);border-bottom:1px solid var(--card-border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 28px;height:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;color:var(--text);text-decoration:none}
.nav-logo i{font-size:1.3rem;background:linear-gradient(135deg,var(--primary),var(--income));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-actions{display:flex;gap:8px}
.btn-icon{width:38px;height:38px;border-radius:12px;border:1px solid var(--card-border);background:var(--card);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);font-size:.95rem;text-decoration:none}
.btn-icon:hover{background:var(--card-hover);color:var(--text);border-color:var(--primary)}

.app{padding-top:calc(var(--nav) + 24px);max-width:1200px;margin:0 auto;padding-left:24px;padding-right:24px;padding-bottom:60px}

.hero{text-align:center;padding:36px 0 40px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;background:var(--primary-glow);border:1px solid rgba(124,92,252,0.2);font-size:.78rem;color:var(--primary-light);margin-bottom:14px;font-weight:500}
.hero h1{font-size:2.4rem;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--primary-light) 50%,var(--income) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text2);font-size:.95rem}

/* Month Navigation */
.month-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:24px}
.month-nav h3{font-size:1.15rem;font-weight:700;min-width:140px;text-align:center}
.month-nav button{width:36px;height:36px;border-radius:50%;border:1px solid var(--card-border);background:var(--card);color:var(--text2);cursor:pointer;transition:all var(--transition);display:flex;align-items:center;justify-content:center;font-size:.9rem}
.month-nav button:hover{background:var(--card-hover);color:var(--text);border-color:var(--primary)}

.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.summary-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px 24px;transition:all var(--transition);position:relative;overflow:hidden}
.summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.summary-card.total::before{background:linear-gradient(90deg,var(--primary),transparent)}
.summary-card.income::before{background:linear-gradient(90deg,var(--income),transparent)}
.summary-card.expense::before{background:linear-gradient(90deg,var(--expense),transparent)}
.summary-card:hover{background:var(--card-hover);transform:translateY(-2px)}
.summary-card .s-label{font-size:.78rem;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.summary-card .s-value{font-size:1.5rem;font-weight:700}
.summary-card .s-value.income{color:var(--income)}
.summary-card .s-value.expense{color:var(--expense)}
.summary-card .s-value.total{color:var(--primary-light)}
.summary-card .s-sub{font-size:.75rem;color:var(--text3);margin-top:2px}

.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:24px}
.chart-card.full{grid-column:1/-1}
.chart-card h3{font-size:.9rem;font-weight:600;margin-bottom:16px;color:var(--text2);display:flex;align-items:center;gap:8px}
.chart-card h3 i{color:var(--primary)}
.chart-box{width:100%;min-height:220px;position:relative}
.chart-box.tall{min-height:160px}

.records-section{margin-top:8px}
.records-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.records-header .left h2{font-size:1.15rem;font-weight:700;display:flex;align-items:center;gap:8px}
.records-header .left h2 i{color:var(--primary)}
.records-header .left .r-count{font-size:.8rem;color:var(--text3);margin-top:2px}
.records-header .right{display:flex;gap:8px;align-items:center}
.filter-tab{padding:6px 14px;border-radius:8px;border:1px solid var(--card-border);background:transparent;color:var(--text2);font-size:.78rem;cursor:pointer;transition:all var(--transition);font-family:var(--font)}
.filter-tab.active{background:var(--primary-glow);border-color:var(--primary);color:#fff}
.filter-tab:hover{background:var(--card-hover);color:var(--text)}
.add-btn{padding:10px 24px;border-radius:12px;background:linear-gradient(135deg,var(--primary),#9B85FF);color:#fff;border:none;font-weight:600;font-size:.85rem;cursor:pointer;transition:all var(--transition);font-family:var(--font);white-space:nowrap}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--primary-glow)}

.records-list{display:flex;flex-direction:column;gap:6px}
.record-item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);transition:all var(--transition)}
.record-item:hover{background:var(--card-hover)}
.record-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.record-icon.income{background:var(--income-bg);color:var(--income)}
.record-icon.expense{background:var(--expense-bg);color:var(--expense)}
.record-info{flex:1}
.record-info .r-title{font-size:.92rem;font-weight:600;margin-bottom:2px}
.record-info .r-meta{font-size:.78rem;color:var(--text3)}
.record-amount{font-weight:700;font-size:.95rem;min-width:80px;text-align:right}
.record-amount.income{color:var(--income)}
.record-amount.expense{color:var(--expense)}
.record-actions{display:flex;gap:4px;flex-shrink:0}
.record-actions button{background:none;border:none;color:var(--text3);cursor:pointer;padding:6px;border-radius:8px;transition:all var(--transition);font-size:.8rem;opacity:0}
.record-item:hover .record-actions button{opacity:1}
.record-actions .ra-edit:hover{color:var(--primary);background:var(--primary-glow)}
.record-actions .ra-del:hover{color:var(--expense);background:var(--expense-bg)}
@media(max-width:480px){.record-actions button{opacity:1}}

.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state i{font-size:3rem;margin-bottom:12px;opacity:.3}
.empty-state p{font-size:.9rem}

footer{text-align:center;padding:32px 24px;color:var(--text3);font-size:.82rem;border-top:1px solid var(--card-border);margin-top:48px}
footer a{color:var(--primary-light);text-decoration:none}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s ease;backdrop-filter:blur(8px)}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-content{background:var(--bg2);border:1px solid var(--card-border);border-radius:var(--radius-lg);padding:32px;max-width:440px;width:100%;transform:scale(.95);transition:transform .3s ease}
.modal-overlay.show .modal-content{transform:scale(1)}
.modal-content h3{font-size:1.2rem;font-weight:700;margin-bottom:20px}
.modal-content label{display:block;font-size:.82rem;color:var(--text2);margin-bottom:6px}
.modal-content input,.modal-content select{padding:12px 14px;border-radius:10px;border:1px solid var(--card-border);background:var(--card);color:var(--text);font-size:.9rem;width:100%;outline:none;transition:border-color var(--transition);font-family:var(--font);margin-bottom:14px}
.modal-content input:focus,.modal-content select:focus{border-color:var(--primary)}
.modal-content .modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-content .modal-actions button{flex:1;padding:12px;border-radius:10px;font-weight:600;font-size:.85rem;cursor:pointer;transition:all var(--transition);font-family:var(--font);border:none}
.modal-content .modal-actions .m-confirm{background:linear-gradient(135deg,var(--primary),#9B85FF);color:#fff}
.modal-content .modal-actions .m-confirm:hover{box-shadow:0 8px 30px var(--primary-glow)}
.modal-content .modal-actions .m-cancel{background:var(--card);color:var(--text2);border:1px solid var(--card-border)}
.modal-content .modal-actions .m-cancel:hover{background:var(--card-hover);color:var(--text)}

.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s ease}
.confirm-overlay.show{opacity:1;pointer-events:auto}
.confirm-box{background:var(--bg2);border:1px solid var(--card-border);border-radius:var(--radius);padding:28px;max-width:360px;width:100%;text-align:center}
.confirm-box p{margin-bottom:20px;font-size:.95rem}
.confirm-box .c-actions{display:flex;gap:10px}
.confirm-box .c-actions button{flex:1;padding:10px;border-radius:10px;font-weight:600;cursor:pointer;transition:all var(--transition);font-family:var(--font);border:none;font-size:.85rem}
.confirm-box .c-yes{background:var(--expense);color:#fff}
.confirm-box .c-yes:hover{box-shadow:0 4px 15px rgba(255,107,107,0.3)}
.confirm-box .c-no{background:var(--card);color:var(--text2);border:1px solid var(--card-border)}
.confirm-box .c-no:hover{background:var(--card-hover)}

@media(max-width:900px){.summary-grid{grid-template-columns:repeat(2,1fr)}.charts-grid{grid-template-columns:1fr}}
@media(max-width:520px){.summary-grid{grid-template-columns:1fr}.hero h1{font-size:1.7rem}.modal-content{padding:24px}.records-header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<nav><div class="nav-inner">
<a href="../" class="nav-logo"><i class="fas fa-wallet"></i> 财务小管家</a>
<div class="nav-actions">
<a href="../" class="btn-icon" title="返回"><i class="fas fa-home"></i></a>
</div></div></nav>

<div class="app">
  <div class="hero">
    <div class="hero-badge"><i class="fas fa-shield-alt"></i> 数据本地保存 · 安全无忧</div>
    <h1>财务小管家</h1>
    <p>记录每一笔收支，掌握自己的财务状况</p>
  </div>

  <div class="month-nav">
    <button onclick="changeMonth(-1)" title="上个月"><i class="fas fa-chevron-left"></i></button>
    <h3 id="monthTitle">2026年7月</h3>
    <button onclick="changeMonth(1)" title="下个月"><i class="fas fa-chevron-right"></i></button>
  </div>

  <div class="summary-grid" id="summaryGrid">
    <div class="summary-card total"><div class="s-label">总资产</div><div class="s-value total" id="totalBalance">¥0</div><div class="s-sub">所有时间</div></div>
    <div class="summary-card income"><div class="s-label">收入</div><div class="s-value income" id="monthIncome">¥0</div><div class="s-sub" id="incomeCount">0 笔</div></div>
    <div class="summary-card expense"><div class="s-label">支出</div><div class="s-value expense" id="monthExpense">¥0</div><div class="s-sub" id="expenseCount">0 笔</div></div>
    <div class="summary-card total"><div class="s-label">结余</div><div class="s-value total" id="monthBalance">¥0</div><div class="s-sub">当月</div></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card"><h3><i class="fas fa-chart-pie"></i> 支出分类</h3><div class="chart-box" id="pieChart"><div class="empty-state" style="padding:40px 0"><i class="fas fa-chart-pie"></i><p>暂无数据</p></div></div></div>
    <div class="chart-card"><h3><i class="fas fa-chart-line"></i> 月度趋势</h3><div class="chart-box" id="lineChart"><div class="empty-state" style="padding:40px 0"><i class="fas fa-chart-line"></i><p>暂无数据</p></div></div></div>
    <div class="chart-card full"><h3><i class="fas fa-chart-bar"></i> 每日支出分布</h3><div class="chart-box tall" id="barChart"><div class="empty-state" style="padding:30px 0"><i class="fas fa-chart-bar"></i><p>暂无数据</p></div></div></div>
  </div>

  <div class="records-section">
    <div class="records-header">
      <div class="left">
        <h2><i class="fas fa-list"></i> 记账记录</h2>
        <div class="r-count" id="recordCount">共 0 条</div>
      </div>
      <div class="right">
        <button class="filter-tab active" data-fl="all" onclick="setFilter('all')">全部</button>
        <button class="filter-tab" data-fl="income" onclick="setFilter('income')">收入</button>
        <button class="filter-tab" data-fl="expense" onclick="setFilter('expense')">支出</button>
        <button class="add-btn" onclick="openModal()"><i class="fas fa-plus"></i> 记一笔</button>
      </div>
    </div>
    <div class="records-list" id="recordsList"><div class="empty-state"><i class="fas fa-receipt"></i><p>还没有记录，记一笔吧</p></div></div>
  </div>
</div>

<footer><p>&copy; 2026 刘毅 · 财务小管家 · 数据仅保存在本地 · <a href="../">返回作品集</a></p></footer>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle"><i class="fas fa-pen"></i> 记一笔</h3>
    <label>类型</label>
    <select id="recordType"><option value="expense">支出</option><option value="income">收入</option></select>
    <label>金额 (¥)</label>
    <input type="number" id="recordAmount" placeholder="0.00" min="0" step="0.01">
    <label>分类</label>
    <select id="recordCategory"></select>
    <label>备注</label>
    <input type="text" id="recordNote" placeholder="买了什么？">
    <div class="modal-actions">
      <button class="m-cancel" onclick="closeModal()">取消</button>
      <button class="m-confirm" onclick="saveRecord()">保存</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmMsg">确定要删除这条记录吗？</p>
    <div class="c-actions">
      <button class="c-no" onclick="closeConfirm()">取消</button>
      <button class="c-yes" id="confirmYesBtn">确定</button>
    </div>
  </div>
</div>

<script>
(function(){
  var CATS={income:['工资','兼职','投资','红包','其他'],expense:['餐饮','交通','购物','娱乐','住房','通讯','医疗','教育','其他']};
  var curYear=new Date().getFullYear(),curMonth=new Date().getMonth();
  var records=JSON.parse(localStorage.getItem('finance_records')||'[]');
  var catSelect=document.getElementById('recordCategory');
  var editingIdx=-1,filter='all',confirmCb=null;

  function updateCats(){
    var t=document.getElementById('recordType').value;
    catSelect.innerHTML=CATS[t].map(function(c){return '<option value="'+c+'">'+c+'</option>'}).join('');
  }
  document.getElementById('recordType').addEventListener('change',updateCats);
  updateCats();

  function saveData(){try{localStorage.setItem('finance_records',JSON.stringify(records))}catch(e){}}
  function fmt(n){return '¥'+Number(n).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}
  function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML;}

  function getMonthData(y,m){
    return records.filter(function(r){var d=new Date(r.date);return d.getMonth()===m&&d.getFullYear()===y});
  }

  function getTotal(arr,type){var s=0;for(var i=0;i<arr.length;i++){if(arr[i].type===type)s+=Number(arr[i].amount)}return s}
  function sumAll(arr){var s=0;for(var i=0;i<arr.length;i++)s+=Number(arr[i].amount);return s}

  function render(){
    document.getElementById('monthTitle').textContent=curYear+'年'+(curMonth+1)+'月';
    var md=getMonthData(curYear,curMonth);
    var mi=getTotal(md,'income'),me=getTotal(md,'expense');
    var ti=getTotal(records,'income'),te=getTotal(records,'expense');

    document.getElementById('totalBalance').textContent=fmt(ti-te);
    document.getElementById('monthIncome').textContent=fmt(mi);
    document.getElementById('monthExpense').textContent=fmt(me);
    document.getElementById('monthBalance').textContent=fmt(mi-me);
    document.getElementById('incomeCount').textContent=md.filter(function(r){return r.type==='income'}).length+' 笔';
    document.getElementById('expenseCount').textContent=md.filter(function(r){return r.type==='expense'}).length+' 笔';

    // Records
    var list=document.getElementById('recordsList');
    var sorted=records.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date)});
    if(filter!=='all'){sorted=sorted.filter(function(r){return r.type===filter});}
    document.getElementById('recordCount').textContent='共 '+sorted.length+' 条';
    if(sorted.length===0){
      list.innerHTML='<div class="empty-state"><i class="fas fa-receipt"></i><p>没有符合条件的记录</p></div>';
    }else{
      var h='';
      for(var i=0;i<sorted.length;i++){
        var r=sorted[i],idx=records.indexOf(r),d=new Date(r.date);
        var icon=r.type==='income'?'<i class="fas fa-arrow-down"></i>':'<i class="fas fa-arrow-up"></i>';
        h+='<div class="record-item"><div class="record-icon '+r.type+'">'+icon+'</div>'+
          '<div class="record-info"><div class="r-title">'+esc(r.note||r.category)+'</div><div class="r-meta">'+r.category+' · '+(d.getMonth()+1)+'月'+d.getDate()+'日</div></div>'+
          '<div class="record-amount '+r.type+'">'+(r.type==='income'?'+':'-')+Number(r.amount).toLocaleString()+'</div>'+
          '<div class="record-actions">'+
          '<button class="ra-edit" onclick="editRecord('+idx+')"><i class="fas fa-pen"></i></button>'+
          '<button class="ra-del" onclick="confirmDel('+idx+')"><i class="fas fa-times"></i></button>'+
          '</div></div>';
      }
      list.innerHTML=h;
    }

    drawPieChart(md);
    drawLineChart();
    drawBarChart(md);
  }

  // Charts
  function groupBy(arr,key){
    var g={};
    for(var i=0;i<arr.length;i++){
      var v=arr[i][key];
      g[v]=(g[v]||0)+Number(arr[i].amount);
    }
    return g;
  }

  function drawPieChart(md){
    var c=document.getElementById('pieChart');
    var ex=md.filter(function(r){return r.type==='expense'});
    if(ex.length===0){c.innerHTML='<div class="empty-state" style="padding:40px 0"><i class="fas fa-chart-pie"></i><p>暂无数据</p></div>';return;}
    var g=groupBy(ex,'category');
    var total=0;for(var k in g)total+=g[k];
    var cols=['#7C5CFC','#FF6B6B','#00D68F','#FFAA00','#36C5F0','#FF8ED4','#7B68EE','#20C997','#E85D4A'];
    var h='<div style="display:flex;flex-wrap:wrap;gap:10px">',i=0;
    for(var cat in g){
      var p=(g[cat]/total*100).toFixed(1);
      h+='<div style="display:flex;align-items:center;gap:6px;min-width:100px"><div style="width:10px;height:10px;border-radius:2px;background:'+cols[i%cols.length]+'"></div><span style="font-size:.8rem;color:var(--text2)">'+cat+'</span><span style="font-size:.8rem;font-weight:600">'+p+'%</span></div>';
      i++;
    }
    h+='<div style="width:100%;height:10px;border-radius:5px;background:var(--card-border);display:flex;overflow:hidden;margin-top:6px">';i=0;
    for(var cat in g){h+='<div style="height:100%;width:'+(g[cat]/total*100)+'%;background:'+cols[i%cols.length]+'"></div>';i++;}
    h+='</div></div>';
    c.innerHTML=h;
  }

  function drawLineChart(){
    var c=document.getElementById('lineChart');
    var months=[];
    for(var m=5;m>=0;m--){
      var d=new Date();d.setMonth(d.getMonth()-m);
      var y=d.getFullYear(),mo=d.getMonth();
      var md=records.filter(function(r){var dd=new Date(r.date);return dd.getFullYear()===y&&dd.getMonth()===mo});
      months.push({label:(mo+1)+'月',income:getTotal(md,'income'),expense:getTotal(md,'expense')});
    }
    var max=1;for(var i=0;i<months.length;i++)max=Math.max(max,months[i].income,months[i].expense);
    var h='<div style="display:flex;align-items:flex-end;gap:10px;height:160px;padding:0 4px">';
    for(var i=0;i<months.length;i++){
      var m=months[i],ih=m.income/max*140,eh=m.expense/max*140;
      h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end">'+
        '<div style="width:100%;max-width:28px;height:'+Math.max(ih,2)+'px;border-radius:4px 4px 0 0;background:var(--income);opacity:.8;transition:height .4s ease"></div>'+
        '<div style="width:100%;max-width:28px;height:'+Math.max(eh,2)+'px;border-radius:4px 4px 0 0;background:var(--expense);opacity:.8;margin-top:3px;transition:height .4s ease"></div>'+
        '<span style="font-size:.65rem;color:var(--text2);margin-top:6px;font-weight:500">'+m.label+'</span></div>';
    }
    h+='</div><div style="display:flex;gap:20px;justify-content:center;margin-top:8px"><span style="font-size:.72rem;color:var(--text2)"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--income);margin-right:4px"></span>收入</span><span style="font-size:.72rem;color:var(--text2)"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--expense);margin-right:4px"></span>支出</span></div>';
    c.innerHTML=h;
  }

  function drawBarChart(md){
    var c=document.getElementById('barChart');
    var ex=md.filter(function(r){return r.type==='expense'});
    if(ex.length===0){c.innerHTML='<div class="empty-state" style="padding:30px 0"><i class="fas fa-chart-bar"></i><p>暂无数据</p></div>';return;}
    var daily={};for(var i=0;i<ex.length;i++){var d=new Date(ex[i].date).getDate();daily[d]=(daily[d]||0)+Number(ex[i].amount);}
    var dim=new Date(curYear,curMonth+1,0).getDate();
    var max=1;for(var k in daily)max=Math.max(max,daily[k]);
    var h='<div style="display:flex;align-items:flex-end;gap:2px;height:130px;padding:0 2px">';
    for(var d=1;d<=dim;d++){
      var v=daily[d]||0,ht=v/max*120;
      h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end" title="'+d+'日: ¥'+(v>0?v.toFixed(0):'0')+'">'+
        '<div style="width:100%;height:'+Math.max(ht,v>0?2:0)+'px;border-radius:2px 2px 0 0;background:'+(v>0?'var(--expense)':'var(--card-border)')+';opacity:'+(v>0?'.8':'.25')+'"></div>'+
        (d%5===0?'<span style="font-size:.55rem;color:var(--text3);margin-top:3px">'+d+'</span>':'')+'</div>';
    }
    h+='</div>';
    c.innerHTML=h;
  }

  // Month Nav
  window.changeMonth=function(d){
    curMonth+=d;
    if(curMonth>11){curMonth=0;curYear++;}
    if(curMonth<0){curMonth=11;curYear--;}
    render();
  };

  // Filter
  window.setFilter=function(f){
    filter=f;
    document.querySelectorAll('.filter-tab').forEach(function(b){b.classList.toggle('active',b.dataset.fl===f)});
    render();
  };

  // Modal
  window.openModal=function(idx){
    editingIdx=typeof idx==='number'?idx:-1;
    document.getElementById('modalTitle').innerHTML=editingIdx>=0?'<i class="fas fa-pen"></i> 编辑记录':'<i class="fas fa-plus"></i> 记一笔';
    document.getElementById('recordAmount').value='';
    document.getElementById('recordNote').value='';
    if(editingIdx>=0){
      var r=records[editingIdx];
      document.getElementById('recordType').value=r.type;
      updateCats();
      document.getElementById('recordAmount').value=r.amount;
      document.getElementById('recordCategory').value=r.category;
      document.getElementById('recordNote').value=r.note||'';
    }else{updateCats();}
    document.getElementById('modal').classList.add('show');
    setTimeout(function(){document.getElementById('recordAmount').focus()},300);
  };
  window.closeModal=function(){document.getElementById('modal').classList.remove('show');editingIdx=-1;};

  // Save (supports Enter key via modal form)
  window.saveRecord=function(){
    var type=document.getElementById('recordType').value;
    var amount=parseFloat(document.getElementById('recordAmount').value);
    var category=document.getElementById('recordCategory').value;
    var note=document.getElementById('recordNote').value.trim();
    if(!amount||amount<=0){alert('请输入有效金额');return;}
    var record={type:type,amount:amount,category:category,note:note||category,date:new Date().toISOString()};
    if(editingIdx>=0){records[editingIdx]=record;}else{records.push(record);}
    saveData();
    closeModal();
    render();
  };

  // Enter key in modal
  document.getElementById('recordAmount').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();document.getElementById('recordNote').focus()}});
  document.getElementById('recordNote').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();saveRecord()}});

  // Edit
  window.editRecord=function(idx){openModal(idx);};

  // Confirm Delete
  window.confirmDel=function(idx){
    document.getElementById('confirmMsg').textContent='确定要删除这条记账记录吗？';
    document.getElementById('confirmOverlay').classList.add('show');
    confirmCb=function(){records.splice(idx,1);saveData();render();closeConfirm();};
  };
  window.closeConfirm=function(){document.getElementById('confirmOverlay').classList.remove('show');confirmCb=null;};
  document.getElementById('confirmYesBtn').addEventListener('click',function(){if(confirmCb)confirmCb();});

  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeConfirm();}});

  render();
})();
</script>
</body>
</html>
