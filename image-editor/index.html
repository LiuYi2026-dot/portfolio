<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 智能图像工坊 · 刘毅</title>
<meta name="description" content="在线图像编辑器 - 滤镜、调色、旋转，Canvas实时处理">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
<meta property="og:title" content="AI 智能图像工坊 · 刘毅">
<meta property="og:description" content="在线图像编辑器 - 滤镜、调色、旋转，Canvas实时处理，浏览器端本地处理不上传服务器。">

<meta property="og:url" content="https://liuyi2026-dot.github.io/portfolio/image-editor/">

<link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07070F;--bg2:#0E0E1A;--surface:rgba(255,255,255,0.04);--surface-hover:rgba(255,255,255,0.07);--surface-active:rgba(255,255,255,0.1);--border:rgba(255,255,255,0.06);--border-light:rgba(255,255,255,0.12);--text:#F1F1F6;--text2:#8888A8;--text3:#555578;--primary:#6C5CE7;--primary-light:#A29BFE;--primary-glow:rgba(108,92,231,0.25);--accent:#00CEC9;--radius:16px;--radius-lg:24px;--radius-xl:32px;--shadow:0 8px 32px rgba(0,0,0,0.5);--nav:72px;--font:'Inter','Noto Sans SC',system-ui,-apple-system,sans-serif;--ease:0.5s cubic-bezier(0.22,1,0.36,1)}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 20% 50%,rgba(108,92,231,0.08),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(0,206,201,0.05),transparent 50%)}
nav{position:fixed;top:0;left:0;right:0;height:var(--nav);z-index:100;background:rgba(7,7,15,0.85);backdrop-filter:blur(24px) saturate(2);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 28px;height:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.1rem;color:var(--text);text-decoration:none}
.nav-logo i{font-size:1.4rem;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-actions{display:flex;gap:8px}
.btn-icon{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s ease;font-size:.95rem;text-decoration:none}
.btn-icon:hover{background:var(--surface-hover);color:var(--text);border-color:var(--primary)}

.app{padding-top:calc(var(--nav)+28px);max-width:1200px;margin:0 auto;padding:0 24px 60px}
.hero{text-align:center;padding:40px 0 44px;animation:fadeUp .6s ease}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 18px;border-radius:20px;background:var(--primary-glow);border:1px solid rgba(108,92,231,0.2);font-size:.78rem;color:var(--primary-light);margin-bottom:16px;font-weight:500}
.hero h1{font-size:2.6rem;font-weight:800;line-height:1.15;margin-bottom:12px;background:linear-gradient(135deg,#fff 0%,var(--primary-light) 50%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text2);font-size:.95rem;max-width:480px;margin:0 auto}

@keyframes fadeUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Upload Zone - Glass morphism */
.upload-zone{max-width:520px;margin:0 auto 40px;padding:48px;border-radius:var(--radius-xl);text-align:center;cursor:pointer;position:relative;overflow:hidden;background:var(--surface);transition:all var(--ease)}
.upload-zone .gradient-border{position:absolute;inset:-2px;border-radius:var(--radius-xl);background:conic-gradient(from 0deg,var(--primary),var(--accent),var(--primary-light),var(--accent),var(--primary));opacity:0;transition:opacity .5s ease;z-index:0;animation:spin 6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-zone::after{content:'';position:absolute;inset:0;border-radius:var(--radius-xl);background:var(--surface);z-index:1;margin:2px}
.upload-zone:hover .gradient-border{opacity:.6}
.upload-zone.has-image .gradient-border{opacity:.8}
.upload-zone>*{position:relative;z-index:2}
.upload-zone .uz-icon{font-size:3rem;color:var(--primary-light);margin-bottom:14px}
.upload-zone .uz-icon i{animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.upload-zone p{color:var(--text2);font-size:.92rem}
.upload-zone .uz-btn{display:inline-block;margin-top:16px;padding:10px 28px;border-radius:12px;background:linear-gradient(135deg,var(--primary),#8B7FFF);color:#fff;font-weight:600;font-size:.85rem;transition:all .3s ease;border:none;cursor:pointer;font-family:var(--font);position:relative;overflow:hidden}
.upload-zone .uz-btn::after{content:'';position:absolute;inset:0;border-radius:12px;background:linear-gradient(135deg,transparent,rgba(255,255,255,.15));opacity:0;transition:opacity .3s}
.upload-zone .uz-btn:hover::after{opacity:1}
.upload-zone .uz-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--primary-glow)}
.upload-zone .img-preview{max-height:180px;border-radius:12px;max-width:100%;display:none;margin-bottom:12px}
.upload-zone .img-preview.show{display:inline-block}

/* Editor Grid */
.editor-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;display:none;animation:fadeUp .5s ease}
.editor-grid.show{display:grid}

.preview-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;overflow:hidden;transition:all .3s}
.preview-panel:hover{border-color:var(--border-light)}
.preview-panel .canvas-wrap{display:flex;align-items:center;justify-content:center;min-height:320px;background:var(--bg2);border-radius:12px;overflow:hidden;position:relative;background-image:radial-gradient(var(--border) 1px,transparent 1px);background-size:20px 20px}
.preview-panel canvas{max-width:100%;max-height:400px;border-radius:8px;display:block}
.preview-panel .img-info{display:flex;gap:24px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.preview-panel .img-info .info-tag{padding:4px 14px;border-radius:6px;background:var(--surface-active);font-size:.75rem;color:var(--text2);display:flex;align-items:center;gap:5px}
.preview-panel .img-info .info-tag i{color:var(--primary-light);font-size:.8rem}

/* Controls */
.controls-panel{display:flex;flex-direction:column;gap:12px}
.ctrl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:border-color .3s}
.ctrl-card:hover{border-color:var(--border-light)}
.ctrl-card h3{font-size:.75rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ctrl-card h3 i{color:var(--primary)}
.slider-group{margin-bottom:8px}
.slider-group:last-child{margin-bottom:0}
.slider-group label{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text2);margin-bottom:4px}
.slider-group label span{color:var(--text);font-weight:600;min-width:28px;text-align:right;font-size:.82rem}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:var(--border);outline:none;transition:background .3s}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));cursor:pointer;box-shadow:0 0 20px var(--primary-glow);border:2px solid var(--bg);transition:transform .2s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));cursor:pointer;border:2px solid var(--bg)}

.filter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.filter-btn{padding:7px 4px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:.72rem;cursor:pointer;transition:all .25s ease;font-family:var(--font);text-align:center;position:relative;overflow:hidden}
.filter-btn::before{content:'';position:absolute;inset:0;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--accent));opacity:0;transition:opacity .3s}
.filter-btn:hover{background:var(--surface-hover);color:var(--text);border-color:var(--border-light)}
.filter-btn.active{background:linear-gradient(135deg,var(--primary),#8B7FFF);border-color:transparent;color:#fff;box-shadow:0 4px 15px var(--primary-glow)}
.filter-btn .f-icon{display:block;font-size:.85rem;margin-bottom:2px;position:relative}

.actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.action-btn{padding:11px 8px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:.8rem;cursor:pointer;transition:all .3s ease;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:5px;font-weight:500}
.action-btn:hover{background:var(--surface-hover);color:var(--text);border-color:var(--border-light);transform:translateY(-1px)}
.action-btn.primary{background:linear-gradient(135deg,var(--primary),#8B7FFF);color:#fff;border:none}
.action-btn.primary:hover{box-shadow:0 8px 30px var(--primary-glow);transform:translateY(-2px)}
.action-btn.danger:hover{color:#FF6B6B;border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.08)}
.action-btn:disabled{opacity:.25;cursor:not-allowed;transform:none!important}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(255,255,255,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border-light);color:var(--text);padding:12px 28px;border-radius:14px;font-size:.85rem;opacity:0;transition:all .4s cubic-bezier(.22,1,.36,1);pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{text-align:center;padding:32px 24px;color:var(--text3);font-size:.8rem;border-top:1px solid var(--border);margin-top:60px}
footer a{color:var(--primary-light);text-decoration:none}

@media(max-width:860px){.editor-grid,.editor-grid.show{grid-template-columns:1fr}.hero h1{font-size:2rem}.filter-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.hero h1{font-size:1.6rem}.upload-zone{padding:32px 20px}.ctrl-card{padding:14px 14px}.preview-panel{padding:14px}.preview-panel .canvas-wrap{min-height:200px}}
</style>
</head>
<body>
<nav><div class="nav-inner">
<a href="../" class="nav-logo"><i class="fas fa-palette"></i> 图像工坊</a>
<div class="nav-actions">
<a href="../" class="btn-icon" title="返回作品集"><i class="fas fa-home"></i></a>
</div></div></nav>

<div class="app">
  <div class="hero">
    <div class="hero-badge"><span style="width:6px;height:6px;border-radius:50%;background:#00CEC9;display:inline-block;animation:pulse 2s infinite"></span> 浏览器端处理 · 不上传服务器</div>
    <h1>AI 智能图像工坊</h1>
    <p>上传图片，在线滤镜、调色、旋转。所有处理在本地完成</p>
  </div>

  <div class="upload-zone" id="uploadZone">
    <div class="gradient-border"></div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <div class="uz-icon" id="uzIcon"><i class="fas fa-cloud-upload-alt"></i></div>
    <p id="uzText">拖拽图片到此处</p>
    <button class="uz-btn" onclick="event.stopPropagation();document.getElementById('fileInput').click()">选择图片</button>
    <img class="img-preview" id="imgPreview" alt="预览">
  </div>

  <div class="editor-grid" id="editorGrid">
    <div class="preview-panel">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="mainCanvas"></canvas>
      </div>
      <div class="img-info" id="imgInfo">
        <span class="info-tag"><i class="fas fa-image"></i> <span id="infoSize">暂无图片</span></span>
        <span class="info-tag"><i class="fas fa-magic"></i> <span id="infoFilter">原图</span></span>
        <span class="info-tag"><i class="fas fa-undo"></i> <span id="infoRotate">0°</span></span>
      </div>
    </div>

    <div class="controls-panel">
      <div class="ctrl-card">
        <h3><i class="fas fa-magic"></i> 滤镜</h3>
        <div class="filter-grid">
          <button class="filter-btn active" data-filter="original"><span class="f-icon"><i class="fas fa-image"></i></span>原图</button>
          <button class="filter-btn" data-filter="grayscale"><span class="f-icon">◐</span>黑白</button>
          <button class="filter-btn" data-filter="sepia"><span class="f-icon">🏾</span>复古</button>
          <button class="filter-btn" data-filter="invert"><span class="f-icon">◑</span>负片</button>
          <button class="filter-btn" data-filter="warm"><span class="f-icon">☀️</span>暖色</button>
          <button class="filter-btn" data-filter="cool"><span class="f-icon">❄️</span>冷色</button>
        </div>
      </div>

      <div class="ctrl-card">
        <h3><i class="fas fa-sliders-h"></i> 调色</h3>
        <div class="slider-group"><label>亮度 <span id="brightnessVal">0</span></label><input type="range" id="brightness" min="-100" max="100" value="0"></div>
        <div class="slider-group"><label>对比度 <span id="contrastVal">0</span></label><input type="range" id="contrast" min="-100" max="100" value="0"></div>
        <div class="slider-group"><label>饱和度 <span id="saturationVal">0</span></label><input type="range" id="saturation" min="-100" max="100" value="0"></div>
        <div class="slider-group"><label>模糊 <span id="blurVal">0</span></label><input type="range" id="blur" min="0" max="10" value="0"></div>
      </div>

      <div class="ctrl-card">
        <h3><i class="fas fa-crop-alt"></i> 变换</h3>
        <div class="actions-grid">
          <button class="action-btn" id="rotateLBtn"><i class="fas fa-undo-alt"></i> 左旋</button>
          <button class="action-btn" id="rotateRBtn"><i class="fas fa-redo-alt"></i> 右旋</button>
        </div>
      </div>

      <div class="ctrl-card">
        <h3><i class="fas fa-download"></i> 导出</h3>
        <div class="actions-grid">
          <button class="action-btn primary" id="downloadPngBtn" disabled><i class="fas fa-image"></i> PNG</button>
          <button class="action-btn primary" id="downloadJpgBtn" disabled style="background:linear-gradient(135deg,#00CEC9,#00E5A0)"><i class="fas fa-file-image"></i> JPG</button>
        </div>
        <div style="margin-top:6px"><button class="action-btn danger" id="resetBtn" disabled style="width:100%"><i class="fas fa-undo-alt"></i> 重置全部</button></div>
      </div>
    </div>
  </div>
</div>

<footer><p>&copy; 2026 刘毅 · 纯前端图像处理 · <a href="../">返回作品集</a></p></footer>
<div class="toast" id="toast"></div>

<script>
(function(){
  var cv=document.getElementById('mainCanvas'),ctx=cv.getContext('2d');
  var uz=document.getElementById('uploadZone'),fi=document.getElementById('fileInput');
  var eg=document.getElementById('editorGrid'),ip=document.getElementById('imgPreview');
  var rb=document.getElementById('resetBtn');
  var rL=document.getElementById('rotateLBtn'),rR=document.getElementById('rotateRBtn');
  var dP=document.getElementById('downloadPngBtn'),dJ=document.getElementById('downloadJpgBtn');
  var img=null,filter='original',rot=0;
  var ow=0,oh=0;

  function toast(m){
    var t=document.getElementById('toast');
    t.textContent=m;t.classList.add('show');
    clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2000);
  }

  fi.addEventListener('change',function(e){
    if(!e.target.files||!e.target.files[0])return;
    var f=e.target.files[0];
    if(!f.type.startsWith('image/')){toast('请选择图片文件');return;}
    var r=new FileReader();
    r.onload=function(ev){
      var im=new Image();
      im.onload=function(){
        img=im;ow=im.width;oh=im.height;rot=0;
        uz.classList.add('has-image');
        ip.src=ev.target.result;ip.classList.add('show');
        document.getElementById('uzIcon').innerHTML='<i class="fas fa-check-circle" style="color:var(--accent)"></i>';
        document.getElementById('uzText').textContent=f.name+' ('+Math.round(f.size/1024)+'KB)';
        eg.classList.add('show');
        dP.disabled=false;dJ.disabled=false;rb.disabled=false;
        fitCanvas();applyAll();updInfo();
        toast('图片加载成功');
      };
      im.onerror=function(){toast('图片加载失败')};
      im.src=ev.target.result;
    };
    r.readAsDataURL(f);
  });

  function fitCanvas(){
    var w=document.getElementById('canvasWrap');
    var mw=w.clientWidth-28,mh=380;
    var s=Math.min(mw/ow,mh/oh,1);
    cv.width=ow*s;cv.height=oh*s;
  }

  function updInfo(){
    document.getElementById('infoSize').textContent=ow+'×'+oh;
    document.getElementById('infoFilter').textContent=filter==='original'?'原图':filter;
    document.getElementById('infoRotate').textContent=rot+'°';
  }

  function applyAll(){
    if(!img)return;
    var w=cv.width,h=cv.height;
    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.translate(w/2,h/2);
    ctx.rotate(rot*Math.PI/180);
    ctx.drawImage(img,-ow/2*(w/ow),-oh/2*(h/oh),w,h);
    ctx.restore();
    var bl=parseInt(document.getElementById('blur').value)||0;
    if(bl>0){ctx.filter='blur('+bl+'px)';ctx.drawImage(cv,0,0);ctx.filter='none';}
    var id=ctx.getImageData(0,0,w,h),d=id.data,a=d.length;
    var bv=parseInt(document.getElementById('brightness').value)||0;
    var cv2=parseInt(document.getElementById('contrast').value)||0;
    var sv=parseInt(document.getElementById('saturation').value)||0;
    for(var i=0;i<a;i+=4){
      var r=d[i],g=d[i+1],b=d[i+2];
      switch(filter){
        case'grayscale':var gy=.299*r+.587*g+.114*b;d[i]=d[i+1]=d[i+2]=gy;break;
        case'sepia':d[i]=Math.min(255,r*.393+g*.769+b*.189);d[i+1]=Math.min(255,r*.349+g*.686+b*.168);d[i+2]=Math.min(255,r*.272+g*.534+b*.131);break;
        case'invert':d[i]=255-r;d[i+1]=255-g;d[i+2]=255-b;break;
        case'warm':d[i]=Math.min(255,r+30);d[i+1]=Math.min(255,g+15);d[i+2]=Math.max(0,b-15);break;
        case'cool':d[i]=Math.max(0,r-15);d[i+1]=Math.min(255,g+10);d[i+2]=Math.min(255,b+30);break;
      }
      if(bv){d[i]=Math.max(0,Math.min(255,d[i]+bv*2.55));d[i+1]=Math.max(0,Math.min(255,d[i+1]+bv*2.55));d[i+2]=Math.max(0,Math.min(255,d[i+2]+bv*2.55));}
      if(cv2){var cf=(259*(cv2*2.55+255))/(255*(259-cv2*2.55));d[i]=Math.max(0,Math.min(255,cf*(d[i]-128)+128));d[i+1]=Math.max(0,Math.min(255,cf*(d[i+1]-128)+128));d[i+2]=Math.max(0,Math.min(255,cf*(d[i+2]-128)+128));}
      if(sv){var gy=.299*d[i]+.587*d[i+1]+.114*d[i+2];var sf=1+sv/100;d[i]=Math.max(0,Math.min(255,gy+sf*(d[i]-gy)));d[i+1]=Math.max(0,Math.min(255,gy+sf*(d[i+1]-gy)));d[i+2]=Math.max(0,Math.min(255,gy+sf*(d[i+2]-gy)));}
    }
    ctx.putImageData(id,0,0);
    document.getElementById('brightnessVal').textContent=bv;
    document.getElementById('contrastVal').textContent=cv2;
    document.getElementById('saturationVal').textContent=sv;
    document.getElementById('blurVal').textContent=bl;
    updInfo();
  }

  document.querySelectorAll('.filter-btn').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('.filter-btn').forEach(function(x){x.classList.remove('active')});
      this.classList.add('active');filter=this.dataset.filter;applyAll();
    });
  });
  document.querySelectorAll('input[type=range]').forEach(function(s){
    s.addEventListener('input',function(){applyAll()});
  });
  rL.addEventListener('click',function(){rot=(rot-90)%360;if(img)applyAll()});
  rR.addEventListener('click',function(){rot=(rot+90)%360;if(img)applyAll()});
  rb.addEventListener('click',function(){
    if(!img)return;rot=0;filter='original';
    ['brightness','contrast','saturation'].forEach(function(id){document.getElementById(id).value=0});
    document.getElementById('blur').value=0;
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.filter==='original')});
    applyAll();toast('已重置');
  });
  dP.addEventListener('click',function(){
    if(!img)return;
    var a=document.createElement('a');a.download='edit.png';a.href=cv.toDataURL('image/png');a.click();
    toast('PNG 已下载');
  });
  dJ.addEventListener('click',function(){
    if(!img)return;
    var a=document.createElement('a');a.download='edit.jpg';a.href=cv.toDataURL('image/jpeg',.92);a.click();
    toast('JPG 已下载');
