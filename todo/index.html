<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项 App · 刘毅</title>
    <meta name="description" content="刘毅开发的待办事项网页应用 - 支持添加、编辑、标记完成、删除任务，数据保存在浏览器中刷新不丢失。">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #4B3FE3;
            --primary-light: #6C63FF;
            --primary-bg: rgba(75, 63, 227, 0.1);
            --bg: #F5F5FA;
            --card: #FFFFFF;
            --text: #1A1A2E;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --border: #E5E7EB;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --radius: 12px;
            --transition: 0.2s ease;
            --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        [data-theme="dark"] {
            --bg: #0F0F1A;
            --card: #1E1E36;
            --text: #EEEEF0;
            --text-secondary: #A0A0B8;
            --text-muted: #6B6B88;
            --border: #2A2A48;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --primary-bg: rgba(75, 63, 227, 0.2);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
        }
        .app {
            max-width: 560px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }
        .header h1 i { color: var(--primary); margin-right: 8px; }
        .header-actions { display: flex; gap: 10px; }
        .btn-icon {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-secondary);
            transition: all var(--transition);
            font-size: 0.9rem;
        }
        .btn-icon:hover { border-color: var(--primary); color: var(--primary); }

        /* 输入区 */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            background: var(--card);
            color: var(--text);
            outline: none;
            transition: border-color var(--transition);
            font-family: var(--font-sans);
        }
        .input-area input:focus { border-color: var(--primary); }
        .input-area input::placeholder { color: var(--text-muted); }
        .btn-add {
            padding: 12px 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font-sans);
            white-space: nowrap;
        }
        .btn-add:hover { background: var(--primary-light); transform: translateY(-1px); }

        /* 统计 */
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .stats .count strong { color: var(--text); }

        /* 筛选 tabs */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font-sans);
        }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* 任务列表 */
        .todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: all var(--transition);
            animation: fadeIn 0.2s ease;
        }
        .todo-item:hover { box-shadow: var(--shadow); }
        .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-muted); }
        .todo-checkbox {
            width: 20px; height: 20px; flex-shrink: 0;
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.7rem;
            color: transparent;
        }
        .todo-checkbox.checked {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .todo-text {
            flex: 1;
            font-size: 0.92rem;
            word-break: break-word;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            transition: background var(--transition);
        }
        .todo-text:hover { background: var(--primary-bg); }
        .todo-text.editing {
            background: var(--card);
            border: 1px solid var(--primary);
            outline: none;
            padding: 4px 8px;
            cursor: text;
            font-family: var(--font-sans);
            font-size: 0.92rem;
            color: var(--text);
        }
        .todo-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .todo-actions button {
            background: none; border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px;
            transition: color var(--transition);
            opacity: 0;
        }
        .todo-item:hover .todo-actions button { opacity: 1; }
        .todo-actions .edit-btn:hover { color: var(--primary); }
        .todo-actions .delete-btn:hover { color: #EF4444; }

        /* 空状态 */
        .empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }
        .empty i { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
        .empty p { font-size: 0.9rem; }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--text);
            color: var(--bg);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 手机上始终显示按钮 */
        @media (max-width: 480px) {
            .todo-actions button { opacity: 1; }
            .app { padding: 40px 16px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1><i class="fas fa-check-double"></i> 待办事项</h1>
            <div class="header-actions">
                <button class="btn-icon" onclick="clearCompleted()" title="清除已完成">
                    <i class="fas fa-trash-alt"></i>
                </button>
                <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">
                    <i class="fas fa-moon"></i>
                </button>
                <a href="../" class="btn-icon" title="返回作品集">
                    <i class="fas fa-home"></i>
                </a>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="todoInput" placeholder="输入新任务，按回车添加..." autofocus>
            <button class="btn-add" onclick="addTodo()">添加</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
            <button class="filter-btn" data-filter="active" onclick="setFilter('active')">未完成</button>
            <button class="filter-btn" data-filter="done" onclick="setFilter('done')">已完成</button>
        </div>

        <div class="stats">
            <span class="count">共 <strong id="totalCount">0</strong> 项</span>
            <span>剩余 <strong id="activeCount">0</strong> 项</span>
        </div>

        <ul class="todo-list" id="todoList">
            <div class="empty">
                <i class="fas fa-inbox"></i>
                <p>还没有任务，添加一个开始吧</p>
            </div>
        </ul>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ========== 数据管理 ==========
        let todos = JSON.parse(localStorage.getItem('todos') || '[]');
        let currentFilter = 'all';
        let editingIndex = -1;

        function save() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 2000);
        }

        // ========== 渲染 ==========
        function render() {
            const list = document.getElementById('todoList');

            let filtered = todos;
            if (currentFilter === 'active') filtered = todos.filter(t => !t.done);
            if (currentFilter === 'done') filtered = todos.filter(t => t.done);

            if (filtered.length === 0) {
                const msgs = { all: '还没有任务，添加一个开始吧', active: '所有任务都完成了！', done: '还没有已完成的任务' };
                list.innerHTML = `<div class="empty"><i class="fas fa-inbox"></i><p>${msgs[currentFilter]}</p></div>`;
            } else {
                list.innerHTML = filtered.map((todo, i) => {
                    const realIndex = todos.indexOf(todo);
                    const isEditing = editingIndex === realIndex;
                    return `
                        <li class="todo-item ${todo.done ? 'done' : ''}">
                            <div class="todo-checkbox ${todo.done ? 'checked' : ''}" onclick="toggleTodo(${realIndex})">
                                ${todo.done ? '<i class="fas fa-check"></i>' : ''}
                            </div>
                            ${isEditing
                                ? `<input class="todo-text editing" id="editInput" value="${escapeHtml(todo.text)}" onkeydown="saveEdit(event, ${realIndex})" autofocus>`
                                : `<span class="todo-text" ondblclick="startEdit(${realIndex})">${escapeHtml(todo.text)}</span>`
                            }
                            <div class="todo-actions">
                                <button class="edit-btn" onclick="startEdit(${realIndex})" title="编辑"><i class="fas fa-pen"></i></button>
                                <button class="delete-btn" onclick="deleteTodo(${realIndex})" title="删除"><i class="fas fa-times"></i></button>
                            </div>
                        </li>
                    `;
                }).join('');

                // 自动聚焦编辑框
                const editInput = document.getElementById('editInput');
                if (editInput) {
                    const len = editInput.value.length;
                    editInput.setSelectionRange(len, len);
                }
            }

            document.getElementById('totalCount').textContent = todos.length;
            document.getElementById('activeCount').textContent = todos.filter(t => !t.done).length;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // ========== 操作 ==========
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) {
                showToast('请输入任务内容');
                input.focus();
                return;
            }
            todos.push({ text, done: false, createdAt: Date.now() });
            save();
            render();
            input.value = '';
            input.focus();
            showToast('任务已添加');
        }

        function toggleTodo(index) {
            if (index < 0 || index >= todos.length) return;
            if (editingIndex === index) { editingIndex = -1; }
            todos[index].done = !todos[index].done;
            save();
            render();
        }

        function deleteTodo(index) {
            if (index < 0 || index >= todos.length) return;
            todos.splice(index, 1);
            if (editingIndex === index) editingIndex = -1;
            else if (editingIndex > index) editingIndex--;
            save();
            render();
            showToast('任务已删除');
        }

        // ========== 编辑功能 ==========
        function startEdit(index) {
            if (index < 0 || index >= todos.length) return;
            if (todos[index].done) return;
            editingIndex = index;
            render();
        }

        function saveEdit(event, index) {
            if (event.key === 'Enter') {
                const input = event.target;
                const text = input.value.trim();
                if (text) {
                    todos[index].text = text;
                    save();
                    showToast('任务已更新');
                }
                editingIndex = -1;
                render();
            }
            if (event.key === 'Escape') {
                editingIndex = -1;
                render();
            }
        }

        // 点击其他地方取消编辑
        document.addEventListener('click', function(e) {
            if (editingIndex === -1) return;
            if (!e.target.closest('.todo-item')) {
                editingIndex = -1;
                render();
            }
        });

        function clearCompleted() {
            const doneCount = todos.filter(t => t.done).length;
            if (doneCount === 0) {
                showToast('没有已完成的任务');
                return;
            }
            if (!confirm(`确定清除所有已完成的任务吗？（共 ${doneCount} 项）`)) return;
            todos = todos.filter(t => !t.done);
            if (editingIndex >= todos.length) editingIndex = -1;
            save();
            render();
            showToast(`已清除 ${doneCount} 项已完成任务`);
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            editingIndex = -1;
            render();
        }

        document.getElementById('todoInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') addTodo();
        });

        // ========== 主题 ==========
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeBtn');
            const isLight = html.getAttribute('data-theme') === 'light';
            html.setAttribute('data-theme', isLight ? 'dark' : 'light');
            localStorage.setItem('theme', isLight ? 'dark' : 'light');
            btn.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').innerHTML = savedTheme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }

        render();
    </script>
</body>
</html>
