<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项 App · 刘毅</title>
    <meta name="description" content="刘毅开发的待办事项网页应用 - 支持添加、编辑、标记完成、删除任务，数据保存在浏览器中刷新不丢失。">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
    <meta property="og:title" content="待办事项 App · 刘毅">
    <meta property="og:description" content="刘毅开发的待办事项网页应用 - 支持添加、编辑、标记完成、删除任务，数据保存在浏览器中刷新不丢失。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://liuyi2026-dot.github.io/portfolio/todo/">
    <meta name="twitter:card" content="summary_large_image">
    <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #4B3FE3;
            --primary-light: #6C63FF;
            --primary-bg: rgba(75, 63, 227, 0.1);
            --bg: #F5F5FA;
            --card: #FFFFFF;
            --text: #1A1A2E;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --border: #E5E7EB;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --radius: 12px;
            --transition: 0.2s ease;
            --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        [data-theme="dark"] {
            --bg: #0F0F1A;
            --card: #1E1E36;
            --text: #EEEEF0;
            --text-secondary: #A0A0B8;
            --text-muted: #6B6B88;
            --border: #2A2A48;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --primary-bg: rgba(75, 63, 227, 0.2);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
            animation: pageIn 0.3s ease;
        }
        @keyframes pageIn { from { opacity: 0; } to { opacity: 1; } }
        .app { max-width: 560px; margin: 0 auto; padding: 60px 20px; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .header h1 i { color: var(--primary); margin-right: 8px; }
        .header-actions { display: flex; gap: 8px; }
        .btn-icon {
            background: var(--card); border: 1px solid var(--border); border-radius: 8px;
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-secondary); transition: all var(--transition); font-size: 0.9rem;
        }
        .btn-icon:hover { border-color: var(--primary); color: var(--primary); }

        .input-area { display: flex; gap: 10px; margin-bottom: 24px; }
        .input-area input {
            flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px;
            font-size: 0.95rem; background: var(--card); color: var(--text);
            outline: none; transition: border-color var(--transition); font-family: var(--font-sans);
        }
        .input-area input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
        .input-area input::placeholder { color: var(--text-muted); }
        .btn-add {
            padding: 12px 20px; background: var(--primary); color: #fff;
            border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: all var(--transition); font-family: var(--font-sans); white-space: nowrap;
        }
        .btn-add:hover { background: var(--primary-light); transform: translateY(-1px); }
        .btn-add:active { transform: scale(0.97); }

        .stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 0.85rem; color: var(--text-muted); }
        .stats .count strong { color: var(--text); }
        .filters { display: flex; gap: 8px; margin-bottom: 16px; }
        .filter-btn {
            padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); font-size: 0.82rem;
            cursor: pointer; transition: all var(--transition); font-family: var(--font-sans);
        }
        .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .todo-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px; background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); transition: all var(--transition); animation: fadeIn 0.2s ease;
        }
        .todo-item:hover { box-shadow: var(--shadow); }
        .todo-item.done { opacity: 0.65; }
        .todo-item.done .todo-text { text-decoration: line-through; color: var(--text-muted); }
        .todo-checkbox {
            width: 22px; height: 22px; flex-shrink: 0;
            border: 2px solid var(--border); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all var(--transition); font-size: 0.7rem; color: transparent;
        }
        .todo-checkbox.checked { background: var(--primary); border-color: var(--primary); color: #fff; }
        .todo-text {
            flex: 1; font-size: 0.92rem; word-break: break-word; cursor: pointer;
            padding: 4px 6px; border-radius: 4px; transition: background var(--transition);
            user-select: none;
        }
        .todo-text:hover { background: var(--primary-bg); }
        .todo-text.editing {
            background: var(--card); border: 1px solid var(--primary); outline: none;
            padding: 4px 8px; cursor: text; font-family: var(--font-sans);
            font-size: 0.92rem; color: var(--text); user-select: auto;
            box-shadow: 0 0 0 3px var(--primary-bg);
        }
        .todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .todo-actions button {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 0.8rem; padding: 6px; border-radius: 6px;
            transition: all var(--transition); opacity: 0;
        }
        .todo-item:hover .todo-actions button { opacity: 1; }
        .todo-actions .edit-btn:hover { background: var(--primary-bg); color: var(--primary); }
        .todo-actions .delete-btn:hover { background: rgba(239,68,68,0.1); color: #EF4444; }

        .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
        .empty i { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
        .empty p { font-size: 0.9rem; }

        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
            background: var(--text); color: var(--bg); padding: 10px 24px; border-radius: 8px;
            font-size: 0.85rem; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 9999;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 批量操作栏 */
        .batch-bar {
            display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 12px; font-size: 0.8rem;
        }
        .batch-bar button {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            padding: 4px 10px; border-radius: 6px; transition: all var(--transition);
            font-family: var(--font-sans); font-size: 0.8rem;
        }
        .batch-bar button:hover { background: var(--primary-bg); color: var(--primary); }
        .batch-bar .danger:hover { color: #EF4444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 480px) {
            .todo-actions button { opacity: 1; }
            .app { padding: 40px 16px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1><i class="fas fa-check-double"></i> 待办事项</h1>
            <div class="header-actions">
                <button class="btn-icon" onclick="clearCompleted()" title="清除已完成"><i class="fas fa-trash-alt"></i></button>
                <button class="btn-icon" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
                <a href="../" class="btn-icon" title="返回作品集"><i class="fas fa-home"></i></a>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="todoInput" placeholder="输入新任务，按回车添加..." autofocus>
            <button class="btn-add" onclick="addTodo()">添加</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
            <button class="filter-btn" data-filter="active" onclick="setFilter('active')">未完成</button>
            <button class="filter-btn" data-filter="done" onclick="setFilter('done')">已完成</button>
        </div>

        <div class="stats">
            <span class="count">共 <strong id="totalCount">0</strong> 项</span>
            <span>剩余 <strong id="activeCount">0</strong> 项</span>
        </div>

        <div class="batch-bar" id="batchBar">
            <button onclick="markAllDone()" title="全部标记完成"><i class="fas fa-check-circle"></i> 全部完成</button>
            <button class="danger" onclick="clearAll()" title="清空全部任务"><i class="fas fa-times-circle"></i> 清空全部</button>
        </div>

        <div class="todo-empty" id="todoEmpty"><div class="empty"><i class="fas fa-inbox"></i><p>还没有任务，添加一个开始吧</p></div></div>
        <ul class="todo-list" id="todoList"></ul>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let todos = [];
        try { todos = JSON.parse(localStorage.getItem('todos') || '[]'); } catch(e) { todos = []; }
        let currentFilter = 'all';
        let editingIndex = -1;

        function save() { try { localStorage.setItem('todos', JSON.stringify(todos)); } catch(e) {} }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2000);
        }

        function render() {
            const list = document.getElementById('todoList');
            const empty = document.getElementById('todoEmpty');
            let filtered = todos;
            if (currentFilter === 'active') filtered = todos.filter(t => !t.done);
            if (currentFilter === 'done') filtered = todos.filter(t => t.done);

            if (filtered.length === 0) {
                const msgs = { all: '还没有任务，添加一个开始吧', active: '所有任务都完成了！', done: '还没有已完成的任务' };
                list.innerHTML = '';
                empty.innerHTML = `<div class="empty"><i class="fas fa-inbox"></i><p>${msgs[currentFilter]}</p></div>`;
                empty.style.display = '';
            } else {
                empty.style.display = 'none';
                let html = '';
                for (let i = 0; i < filtered.length; i++) {
                    const todo = filtered[i];
                    const realIndex = todos.indexOf(todo);
                    const isEditing = editingIndex === realIndex;
                    const checked = todo.done ? 'checked' : '';
                    const icon = todo.done ? '<i class="fas fa-check"></i>' : '';
                    html += '<li class="todo-item' + (todo.done ? ' done' : '') + '">' +
                        '<div class="todo-checkbox ' + checked + '" onclick="toggleTodo(' + realIndex + ')" role="checkbox" aria-checked="' + todo.done + '" tabindex="0" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleTodo(' + realIndex + ')}">' +
                        icon +
                        '</div>' +
                        (isEditing
                            ? '<input class="todo-text editing" id="editInput" value="' + escapeHtml(todo.text) + '" onkeydown="saveEdit(event,' + realIndex + ')" onblur="cancelEdit(' + realIndex + ')" autofocus>'
                            : '<span class="todo-text" onclick="startEdit(' + realIndex + ')">' + escapeHtml(todo.text) + '</span>'
                        ) +
                        '<div class="todo-actions">' +
                        '<button class="edit-btn" onclick="startEdit(' + realIndex + ')" aria-label="编辑任务"><i class="fas fa-pen"></i></button>' +
                        '<button class="delete-btn" onclick="deleteTodo(' + realIndex + ')" aria-label="删除任务"><i class="fas fa-times"></i></button>' +
                        '</div>' +
                        '</li>';
                }
                list.innerHTML = html;
                const editInput = document.getElementById('editInput');
                if (editInput) editInput.focus();
            }

            document.getElementById('totalCount').textContent = todos.length;
            document.getElementById('activeCount').textContent = todos.filter(t => !t.done).length;
        }

        function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

        // 新增：点击文字直接编辑（取代之前的双击）
        function startEdit(index) {
            if (index < 0 || index >= todos.length || todos[index].done) return;
            editingIndex = index;
            render();
        }

        function cancelEdit(index) {
            if (editingIndex === index) {
                // 延迟执行，避免点击编辑按钮时blur先触发
                setTimeout(() => {
                    if (editingIndex === index) { editingIndex = -1; render(); }
                }, 150);
            }
        }

        function saveEdit(event, index) {
            if (event.key === 'Enter') {
                const input = event.target;
                const text = input.value.trim();
                if (text) { todos[index].text = text; save(); showToast('任务已更新'); }
                editingIndex = -1; render();
            }
            if (event.key === 'Escape') { editingIndex = -1; render(); }
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) { showToast('请输入任务内容'); input.focus(); return; }
            todos.push({ text, done: false, createdAt: Date.now() });
            save(); render(); input.value = ''; input.focus(); showToast('任务已添加');
        }

        function toggleTodo(index) {
            if (index < 0 || index >= todos.length) return;
            if (editingIndex === index) editingIndex = -1;
            todos[index].done = !todos[index].done;
            save(); render();
        }

        function deleteTodo(index) {
            if (index < 0 || index >= todos.length) return;
            todos.splice(index, 1);
            if (editingIndex === index) editingIndex = -1;
            else if (editingIndex > index) editingIndex--;
            save(); render(); showToast('任务已删除');
        }

        function clearCompleted() {
            const doneCount = todos.filter(t => t.done).length;
            if (doneCount === 0) { showToast('没有已完成的任务'); return; }
            todos = todos.filter(t => !t.done);
            if (editingIndex >= todos.length) editingIndex = -1;
            save(); render(); showToast(`已清除 ${doneCount} 项已完成任务`);
        }

        // 新增：全部标记完成
        function markAllDone() {
            const active = todos.filter(t => !t.done);
            if (active.length === 0) { showToast('所有任务已完成'); return; }
            if (!confirm(`确定将全部 ${active.length} 项未完成任务标记为已完成？`)) return;
            todos.forEach(t => t.done = true);
            if (editingIndex !== -1) editingIndex = -1;
            save(); render(); showToast(`已标记 ${active.length} 项为完成`);
        }

        // 新增：清空全部
        function clearAll() {
            if (todos.length === 0) { showToast('列表为空'); return; }
            if (!confirm(`确定清空全部 ${todos.length} 项任务？此操作不可恢复！`)) return;
            todos = []; editingIndex = -1;
            save(); render(); showToast('已清空全部任务');
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            editingIndex = -1; render();
        }

        document.getElementById('todoInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeBtn');
            const isLight = html.getAttribute('data-theme') === 'light';
            html.setAttribute('data-theme', isLight ? 'dark' : 'light');
            try { localStorage.setItem('theme', isLight ? 'dark' : 'light'); } catch(e) {}
            btn.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }
        try {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
                document.getElementById('themeBtn').innerHTML = savedTheme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            }
        } catch(e) {}
        render();
    </script>
    <footer style="text-align:center;padding:24px;color:var(--text-muted);font-size:0.8rem;border-top:1px solid var(--border);margin-top:20px">
        <p>&copy; 2026 刘毅 · 微信: Love_oneselfly · <a href="mailto:3238416193@qq.com" style="color:var(--primary)">3238416193@qq.com</a> · <a href="../" style="color:var(--primary)">返回作品集</a></p>
    </footer>
</body>
</html>
